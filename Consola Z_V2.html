<!DOCTYPE html>

<head>

<title>Consola Z — Calculadora de Variable Compleja</title>

<!-- React + ReactDOM -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<!-- mathjs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.js"></script>

  #root { min-height: 100vh; }
  .katex { font-size: 1em; }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;




/* ============================== TEMAS (NOCHE / DÍA) ==============================
   `C` es el único punto de verdad del color. App reasigna C antes de renderizar a sus
   hijos, así que todos los componentes leen el tema vigente sin tocar su código.
   `series` es la paleta de acentos: cada tema trae la suya, porque los tonos claros
   del modo noche son ilegibles sobre fondo blanco. */
const THEMES = {
  dark: {
    id: 'dark',
    bg: '#0B0F0E', panel: '#121817', panel2: '#161D1B',
    border: '#1F2B27', borderLit: '#2C3A35',
    text: '#E6F2EC', muted: '#6B8079',
    phosphor: '#6EFFC0', amber: '#FFB454', sky: '#5CC8FF', violet: '#C792EA', danger: '#FF6B6B',
    glow: true,
    series: ['#FFB454', '#5CC8FF', '#C792EA', '#FFD166', '#FF6B6B', '#8BE9FD', '#B4F9C0', '#F7A278'],
  },
  light: {
    id: 'light',
    bg: '#EAEFEC', panel: '#FFFFFF', panel2: '#F5F8F6',
    border: '#D2DDD7', borderLit: '#AEC0B7',
    text: '#0D1A15', muted: '#5A6D65',
    phosphor: '#02795A', amber: '#9C4E00', sky: '#0A5E93', violet: '#672C9E', danger: '#B3261E',
    glow: false,
    series: ['#9C4E00', '#0A5E93', '#672C9E', '#7A5600', '#B3261E', '#0D6577', '#256B3C', '#94401A'],
  },
};
let C = THEMES.dark;
const MONO = "'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace";
const SANS = "'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif";

/* #rgb o #rrggbb -> rgba(...) con alfa dado, usado para el glow de foco de los campos. */
function hexToRgba(hex, alpha = 1) {
  if (!hex) return `rgba(110,255,192,${alpha})`;
  let h = hex.replace('#', '');
  if (h.length === 3) h = h.split('').map((c) => c + c).join('');
  const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ============================== COMPLEX HELPERS ============================== */
function parseComplex(input) {
  if (input === undefined || input === null) return math.complex(0, 0);
  let raw = String(input).trim();
  if (raw === '') return math.complex(0, 0);
  let s = raw.replace(/\s+/g, '');
  // notación polar libre en un solo campo: "5∠30", "5∠30°", "5<30"
  const polarMatch = s.match(/^(-?[\d.]+)(?:∠|<)(-?[\d.]+)°?$/);
  if (polarMatch) {
    const mag = parseFloat(polarMatch[1]);
    const angDeg = parseFloat(polarMatch[2]);
    if (!isNaN(mag) && !isNaN(angDeg)) {
      return math.complex({ r: mag, phi: (angDeg * Math.PI) / 180 });
    }
  }
  s = s.replace(/[jJ]/g, 'i');
  if (s === 'i' || s === '+i') s = '1i';
  if (s === '-i') s = '-1i';
  try {
    return math.complex(s);
  } catch (e) {
    const n = parseFloat(s);
    return isNaN(n) ? null : math.complex(n, 0);
  }
}
function toRad(deg) { return (deg * Math.PI) / 180; }
function toDeg(rad) { return (rad * 180) / Math.PI; }
/* Interpreta un par de campos crudos (dos strings) según el modo de entrada activo (rectangular o polar). */
function complexFromPair(mode, aStr, bStr) {
  const a = aStr === '' || aStr === undefined ? 0 : parseFloat(aStr);
  const b = bStr === '' || bStr === undefined ? 0 : parseFloat(bStr);
  if (isNaN(a) || isNaN(b)) return null;
  if (mode === 'polar') return math.complex({ r: a, phi: toRad(b) });
  return math.complex(a, b);
}
/* Convierte un complejo ya calculado a un par de strings para el modo dado — así al alternar
   rectangular/polar no se pierde el valor numérico que ya estaba cargado. */
function pairFromComplex(mode, z) {
  if (!z) return ['', ''];
  if (mode === 'polar') return [String(round(math.abs(z), 6)), String(round(toDeg(math.arg(z)), 6))];
  return [String(round(z.re, 6)), String(round(z.im, 6))];
}
function round(n, d = 4) {
  if (Math.abs(n) < 1e-9) return 0;
  const f = Math.pow(10, d);
  return Math.round(n * f) / f;
}
function formatComplex(c, digits = 4) {
  if (c === null || c === undefined) return '—';
  const re = round(c.re, digits);
  const im = round(c.im, digits);
  if (im === 0) return `${re}`;
  if (re === 0) return `${im < 0 ? '−' : ''}${Math.abs(im)}j`;
  return `${re} ${im < 0 ? '−' : '+'} ${Math.abs(im)}j`;
}
function polarString(c) {
  const r = round(math.abs(c), 4);
  const th = round((math.arg(c) * 180) / Math.PI, 3);
  return `${r} ∠ ${th}°`;
}

/* ============================== FORMATO LaTeX ==============================
   Igual que en Consola S: las cantidades rectangulares se muestran entre
   paréntesis  (a + jb); los reales puros van sin paréntesis. */
function isFiniteC(c) { return c && isFinite(c.re) && isFinite(c.im); }
function texNum(n, d = 4) {
  if (n === null || n === undefined || !isFinite(n)) return '\\text{—}';
  if (Math.abs(n) < 1e-10) return '0';
  const a = Math.abs(n);
  if (a >= 1e7 || a < 1e-4) { const t = n.toExponential(4).split('e'); return `${t[0]}\\times10^{${parseInt(t[1], 10)}}`; }
  return String(round(n, d));
}
function texComplex(c, d = 4) {
  if (!isFiniteC(c)) return '\\text{—}';
  const re = round(c.re, d), im = round(c.im, d);
  if (im === 0) return texNum(re, d);
  const j = `j${texNum(Math.abs(im), d)}`;
  if (re === 0) return `(${im < 0 ? '-' : ''}${j})`;
  return `(${texNum(re, d)} ${im < 0 ? '-' : '+'} ${j})`;
}
function texPolar(c, d = 4) {
  if (!isFiniteC(c)) return '\\text{—}';
  return `${texNum(round(math.abs(c), d), d)}\\,\\angle\\,${texNum(round(toDeg(math.arg(c)), 3), 3)}^\\circ`;
}
function texUnit(u) {
  if (!u) return '';
  if (u === 'Ω') return '\\Omega';
  if (u === 'S') return '\\text{S}';
  return `\\text{${u}}`;
}
function withUnit(tex, u) { return u ? `${tex}\\ ${texUnit(u)}` : tex; }
/* subíndices/superíndices legibles: V₁ → V_{1}, I·jXs → I\,jX_{s} */
function texLabel(name) {
  return String(name)
    .replace(/₁/g, '_{1}').replace(/₂/g, '_{2}')
    .replace(/·/g, '\\cdot ')
    .replace(/Ra/g, 'R_{a}').replace(/Xs/g, 'X_{s}');
}
/* símbolo de operación de la UI -> comando LaTeX, para la ecuación estilo libro de texto */
const OP_TEX = { '+': '+', '−': '-', '×': '\\times', '÷': '\\div' };
function computeBinary(a, b, op) {
  if (op === '+') return math.add(a, b);
  if (op === '−') return math.subtract(a, b);
  if (op === '×') return math.multiply(a, b);
  if (op === '÷') {
    if (math.abs(b) === 0) throw new Error('División entre cero');
    return math.divide(a, b);
  }
}

/* ============================== CIRCUIT (SERIE/PARALELO) HELPERS ============================== */
/* la paleta vive en el tema: se lee en cada render, no se congela al cargar */
function circuitColor(i) { return C.series[i % C.series.length]; }
function seriesEq(list) {
  return list.reduce((acc, z) => math.add(acc, z), math.complex(0, 0));
}
function parallelEq(list) {
  if (list.some((z) => math.abs(z) === 0)) return math.complex(0, 0); // rama en 0Ω cortocircuita el conjunto
  const sumInv = list.reduce((acc, z) => math.add(acc, math.divide(math.complex(1, 0), z)), math.complex(0, 0));
  if (math.abs(sumInv) === 0) throw new Error('La suma de admitancias es 0 (circuito abierto, Zeq → ∞)');
  return math.divide(math.complex(1, 0), sumInv);
}

/* ============================== TRAZA RLC (ESTILO LIBRO DE TEXTO) ==============================
   Traza acumulativa donde cada "hoja" es un componente físico (R, L o C) cuya
   impedancia se deriva de la frecuencia de trabajo en vez de escribirse directamente. */
function computeComponentTrace(items, omega) {
  const rows = [];
  let accValue = null;
  let accExpr = '';
  let accTopOp = null;
  items.forEach((it, idx) => {
    const zVal = componentImpedance(it.kind, it.value, omega);
    if (zVal === null) throw new Error(`Valor inválido en ${it.kind}${idx + 1}`);
    const zLabel = `${it.kind}${idx + 1}`;
    if (idx === 0) {
      accValue = zVal;
      accExpr = zLabel;
      accTopOp = null;
      rows.push({ id: it.id, label: zLabel, mode: null, expr: accExpr, value: accValue, z: zVal, kind: it.kind, rawValue: it.value });
      return;
    }
    const mode = it.combine === 'paralelo' ? 'paralelo' : 'serie';
    const needsParens = accTopOp !== null && accTopOp !== mode;
    const leftStr = needsParens ? `(${accExpr})` : accExpr;
    const opSym = mode === 'serie' ? ' + ' : ' ∥ ';
    accExpr = `${leftStr}${opSym}${zLabel}`;
    accValue = mode === 'serie' ? math.add(accValue, zVal) : parallelEq([accValue, zVal]);
    accTopOp = mode;
    rows.push({ id: it.id, label: zLabel, mode, expr: accExpr, value: accValue, z: zVal, kind: it.kind, rawValue: it.value });
  });
  return rows;
}

/* ============================== MATRIX HELPERS ============================== */
function makeGrid(rows, cols, fill = '') {
  return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
}
function resizeGrid(grid, rows, cols) {
  const ng = makeGrid(rows, cols, '');
  for (let i = 0; i < Math.min(rows, grid.length); i++) {
    for (let j = 0; j < Math.min(cols, grid[0] ? grid[0].length : 0); j++) {
      ng[i][j] = grid[i][j];
    }
  }
  return ng;
}
function gridToComplex(grid) {
  /* Cada celda acepta ahora una EXPRESIÓN compleja completa, no solo un literal:
     "13-5j+10", "(3+4j)*2", "5∠30 + 2∠-45", "10∥(5+5j)". Así, un elemento de Zbus
     que es suma de impedancias de rama se escribe directo, sin sumar en papel.
     Se evalúa con el mismo parser del módulo de circuitos (sin variables Zn). */
  return grid.map((row, i) =>
    row.map((cell, j) => {
      const raw = String(cell).trim();
      if (raw === '') return math.complex(0, 0);
      try {
        return evalZExpr(raw, {});
      } catch (e) {
        throw new Error(`Celda (${i + 1},${j + 1}): ${e.message}`);
      }
    })
  );
}
function ctranspose(A) {
  return math.transpose(A).map((row) => row.map((c) => math.conj(c)));
}
function conjMatrix(A) {
  return A.map((row) => row.map((c) => math.conj(c)));
}

/* ============================== ARGAND DIAGRAM ============================== */
/* Geometría de punta de flecha reutilizable (Argand y el diagrama fasorial punta-cola comparten esto). */
function arrowHeadPts(x1, y1, x2, y2, headLen = 9, headWidth = 6.5) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy) || 1;
  const ux = dx / len, uy = dy / len;
  const bx = x2 - ux * headLen, by = y2 - uy * headLen;
  const px = -uy, py = ux;
  return {
    base: { x: bx, y: by },
    tip: { x: x2, y: y2 },
    p2: { x: bx + (px * headWidth) / 2, y: by + (py * headWidth) / 2 },
    p3: { x: bx - (px * headWidth) / 2, y: by - (py * headWidth) / 2 },
  };
}

function Argand({ points, size = 260 }) {
  const mags = points.map((p) => math.abs(p.value)).filter((m) => isFinite(m));
  const maxMag = Math.max(1, ...mags);
  const scale = (size / 2 - 28) / maxMag;
  const cx = size / 2, cy = size / 2;
  const toXY = (c) => ({ x: cx + c.re * scale, y: cy - c.im * scale });
  const rings = [0.25, 0.5, 0.75, 1];

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width="100%" height={size} style={{ display: 'block' }}>
      <rect x="0" y="0" width={size} height={size} fill={C.bg} />
      {rings.map((f, i) => (
        <circle key={i} cx={cx} cy={cy} r={f * maxMag * scale} fill="none" stroke={C.border} strokeWidth="1" />
      ))}
      <line x1="0" y1={cy} x2={size} y2={cy} stroke={C.border} strokeWidth="1" />
      <line x1={cx} y1="0" x2={cx} y2={size} stroke={C.border} strokeWidth="1" />
      <text x={size - 18} y={cy - 6} fill={C.muted} fontSize="10" fontFamily={MONO}>Re</text>
      <text x={cx + 6} y="12" fill={C.muted} fontSize="10" fontFamily={MONO}>Im</text>
      {points.map((p, i) => {
        if (!isFinite(p.value.re) || !isFinite(p.value.im)) return null;
        const { x, y } = toXY(p.value);
        const isOrigin = Math.abs(x - cx) < 0.6 && Math.abs(y - cy) < 0.6;
        if (isOrigin) {
          return (
            <g key={i}>
              <circle cx={x} cy={y} r="4" fill={p.color} />
              <text x={x + 7} y={y - 7} fill={p.color} fontSize="11" fontFamily={MONO}>{p.label}</text>
            </g>
          );
        }
        const head = arrowHeadPts(cx, cy, x, y);
        return (
          <g key={i}>
            <line x1={cx} y1={cy} x2={head.base.x} y2={head.base.y} stroke={p.color} strokeWidth="1.6" opacity="0.75" />
            <polygon
              points={`${head.tip.x},${head.tip.y} ${head.p2.x},${head.p2.y} ${head.p3.x},${head.p3.y}`}
              fill={p.color}
              style={{ filter: C.glow ? `drop-shadow(0 0 3px ${p.color})` : 'none' }}
            />
            <text x={x + 7} y={y - 7} fill={p.color} fontSize="11" fontFamily={MONO}>{p.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ============================== DIAGRAMA FASORIAL: SUMA PUNTA-COLA ==============================
   Construcción gráfica clásica de la suma de fasores: cada vector se dibuja a continuación
   del anterior (punta-cola) y el fasor resultante se traza del origen absoluto hasta el
   punto final, en línea punteada — la forma en que se enseña la suma vectorial en un libro
   de circuitos, complementando el Argand estándar (vectores desde el origen). */
function PhasorChain({ points, size = 280 }) {
  const cumulative = [math.complex(0, 0)];
  points.forEach((p) => {
    const prev = cumulative[cumulative.length - 1];
    cumulative.push(isFinite(p.value.re) && isFinite(p.value.im) ? math.add(prev, p.value) : prev);
  });
  const xs = cumulative.map((c) => c.re).filter(isFinite);
  const ys = cumulative.map((c) => c.im).filter(isFinite);
  const minX = Math.min(0, ...xs), maxX = Math.max(0, ...xs);
  const minY = Math.min(0, ...ys), maxY = Math.max(0, ...ys);
  const spanX = Math.max(maxX - minX, 1e-6);
  const spanY = Math.max(maxY - minY, 1e-6);
  const pad = 34;
  const scale = Math.min((size - pad * 2) / spanX, (size - pad * 2) / spanY);
  const midX = (minX + maxX) / 2, midY = (minY + maxY) / 2;
  const cx = size / 2, cy = size / 2;
  const toXY = (c) => ({ x: cx + (c.re - midX) * scale, y: cy - (c.im - midY) * scale });

  const origin = toXY(math.complex(0, 0));
  const resultant = cumulative[cumulative.length - 1];
  const resXY = toXY(resultant);
  const resHead = arrowHeadPts(origin.x, origin.y, resXY.x, resXY.y);

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width="100%" height={size} style={{ display: 'block' }}>
      <rect x="0" y="0" width={size} height={size} fill={C.bg} />
      <line x1="0" y1={origin.y} x2={size} y2={origin.y} stroke={C.border} strokeWidth="1" />
      <line x1={origin.x} y1="0" x2={origin.x} y2={size} stroke={C.border} strokeWidth="1" />

      {points.map((p, i) => {
        const a = toXY(cumulative[i]);
        const b = toXY(cumulative[i + 1]);
        if (!isFinite(a.x) || !isFinite(b.x)) return null;
        const head = arrowHeadPts(a.x, a.y, b.x, b.y);
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        return (
          <g key={i}>
            <line x1={a.x} y1={a.y} x2={head.base.x} y2={head.base.y} stroke={p.color} strokeWidth="2" opacity="0.85" />
            <polygon points={`${head.tip.x},${head.tip.y} ${head.p2.x},${head.p2.y} ${head.p3.x},${head.p3.y}`} fill={p.color} />
            <text x={mx + 6} y={my - 6} fill={p.color} fontSize="11" fontFamily={MONO}>{p.label}</text>
          </g>
        );
      })}

      {isFinite(resXY.x) && isFinite(resXY.y) && (
        <g>
          <line x1={origin.x} y1={origin.y} x2={resHead.base.x} y2={resHead.base.y}
            stroke={C.phosphor} strokeWidth="2" strokeDasharray="6,4" opacity="0.95" />
          <polygon
            points={`${resHead.tip.x},${resHead.tip.y} ${resHead.p2.x},${resHead.p2.y} ${resHead.p3.x},${resHead.p3.y}`}
            fill={C.phosphor} style={{ filter: C.glow ? `drop-shadow(0 0 4px ${C.phosphor})` : 'none' }}
          />
        </g>
      )}
      <circle cx={origin.x} cy={origin.y} r="3" fill={C.muted} />
    </svg>
  );
}

/* ============================== ZOOM PLOT: LIENZO FASORIAL INTERACTIVO ==============================
   Lienzo SVG con zoom y paneo para diagramas fasoriales. El problema que resuelve: en casos
   reales (regulación de un transformador, caída en una línea) el ángulo entre V₁ y V₂ es de
   décimas de grado y las flechas se dibujan una encima de la otra. Aquí el usuario puede:
     · rueda del ratón / pellizco táctil → zoom centrado en el cursor
     · arrastrar → paneo
     · AJUSTAR → encuadre de todo el diagrama
     · PUNTA → auto-zoom a la nube de puntas de los fasores (el triángulo de caída de tensión)
   Todo se dibuja en coordenadas de mundo (voltios/amperios) y se transforma a píxeles en JS,
   de modo que grosores de línea, puntas de flecha y etiquetas mantienen tamaño constante a
   cualquier nivel de zoom. */
function niceStep(raw) {
  if (!isFinite(raw) || raw <= 0) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(raw)));
  const m = raw / p;
  return (m <= 1 ? 1 : m <= 2 ? 2 : m <= 5 ? 5 : 10) * p;
}

function ZoomPlot({ segments, arcs = [], tipPoints = null, height = 320, unit = '', note = '' }) {
  const wrapRef = React.useRef(null);
  const svgRef = React.useRef(null);
  const [w, setW] = React.useState(360);
  React.useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver((entries) => {
      const cw = entries[0].contentRect.width;
      if (cw > 0) setW(Math.max(220, cw));
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);
  const H = height;

  const finiteSegs = segments.filter((s) => [s.x1, s.y1, s.x2, s.y2].every(isFinite));
  const allPts = [[0, 0], ...finiteSegs.flatMap((s) => [[s.x1, s.y1], [s.x2, s.y2]])];

  const fitView = React.useCallback((pts, padPx = 48) => {
    const xs = pts.map((p) => p[0]), ys = pts.map((p) => p[1]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const spanX = Math.max(maxX - minX, 1e-12), spanY = Math.max(maxY - minY, 1e-12);
    let ppu = Math.min((w - 2 * padPx) / spanX, (H - 2 * padPx) / spanY);
    if (!isFinite(ppu) || ppu <= 0) ppu = 1;
    return { cx: (minX + maxX) / 2, cy: (minY + maxY) / 2, ppu };
  }, [w, H]);

  const [view, setView] = React.useState(null); // null → auto-encuadre de todo
  const v = view || fitView(allPts);
  const toS = (x, y) => ({ x: w / 2 + (x - v.cx) * v.ppu, y: H / 2 - (y - v.cy) * v.ppu });
  const toW = (sx, sy) => ({ x: v.cx + (sx - w / 2) / v.ppu, y: v.cy - (sy - H / 2) / v.ppu });

  const zoomAt = (sx, sy, factor) => {
    const anchor = toW(sx, sy);
    setView((prev) => {
      const cur = prev || fitView(allPts);
      const ppu = Math.min(Math.max(cur.ppu * factor, 1e-9), 1e12);
      // mantiene el punto bajo el cursor fijo en pantalla
      return {
        ppu,
        cx: anchor.x - (sx - w / 2) / ppu,
        cy: anchor.y + (sy - H / 2) / ppu,
      };
    });
  };

  // rueda del ratón — listener nativo no-pasivo para poder hacer preventDefault
  React.useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    const onWheel = (e) => {
      e.preventDefault();
      const r = el.getBoundingClientRect();
      zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.18 : 1 / 1.18);
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  });

  // paneo con arrastre + pellizco con dos dedos (pointer events)
  const pointers = React.useRef(new Map());
  const gesture = React.useRef(null);
  const onPointerDown = (e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    const r = e.currentTarget.getBoundingClientRect();
    pointers.current.set(e.pointerId, { x: e.clientX - r.left, y: e.clientY - r.top });
    const ps = [...pointers.current.values()];
    gesture.current = ps.length === 2
      ? { type: 'pinch', d0: Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y), v0: { ...v } }
      : { type: 'pan', start: ps[0], v0: { ...v } };
  };
  const onPointerMove = (e) => {
    if (!gesture.current || !pointers.current.has(e.pointerId)) return;
    const r = e.currentTarget.getBoundingClientRect();
    pointers.current.set(e.pointerId, { x: e.clientX - r.left, y: e.clientY - r.top });
    const ps = [...pointers.current.values()];
    const g = gesture.current;
    if (g.type === 'pan' && ps.length === 1) {
      const dx = ps[0].x - g.start.x, dy = ps[0].y - g.start.y;
      setView({ ppu: g.v0.ppu, cx: g.v0.cx - dx / g.v0.ppu, cy: g.v0.cy + dy / g.v0.ppu });
    } else if (g.type === 'pinch' && ps.length === 2) {
      const d = Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y);
      const f = d / (g.d0 || 1);
      const mx = (ps[0].x + ps[1].x) / 2, my = (ps[0].y + ps[1].y) / 2;
      const ppu = Math.min(Math.max(g.v0.ppu * f, 1e-9), 1e12);
      const ax = g.v0.cx + (mx - w / 2) / g.v0.ppu;
      const ay = g.v0.cy - (my - H / 2) / g.v0.ppu;
      setView({ ppu, cx: ax - (mx - w / 2) / ppu, cy: ay + (my - H / 2) / ppu });
    }
  };
  const onPointerUp = (e) => {
    pointers.current.delete(e.pointerId);
    if (pointers.current.size === 0) gesture.current = null;
  };

  // cuadrícula adaptativa con paso "bonito" (1-2-5 × 10ⁿ)
  const step = niceStep(90 / v.ppu);
  const wMin = toW(0, H), wMax = toW(w, 0);
  const gridV = [], gridH = [];
  for (let x = Math.ceil(wMin.x / step) * step; x <= wMax.x; x += step) gridV.push(x);
  for (let y = Math.ceil(wMin.y / step) * step; y <= wMax.y; y += step) gridH.push(y);
  const org = toS(0, 0);

  // barra de escala (esquina inferior izquierda)
  const barUnits = step;
  const barPx = barUnits * v.ppu;
  const fmtN = (n) => {
    const a = Math.abs(n);
    if (a >= 1000) return `${round(n / 1000, 2)}k`;
    if (a < 0.01 && a > 0) return n.toExponential(1);
    return `${round(n, 3)}`;
  };

  const zoomRelFit = v.ppu / fitView(allPts).ppu;

  const ZBtn = ({ children, onClick, title }) => (
    <button onClick={onClick} title={title} style={{
      fontFamily: MONO, fontSize: 11, letterSpacing: '0.06em', padding: '4px 9px',
      background: 'transparent', border: `1px solid ${C.borderLit}`, borderRadius: 3,
      color: C.text, cursor: 'pointer',
    }}>{children}</button>
  );

  return (
    <div ref={wrapRef}>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap', marginBottom: 8 }}>
        <ZBtn onClick={() => setView(null)} title="encuadrar todo el diagrama">AJUSTAR</ZBtn>
        {tipPoints && tipPoints.length >= 1 && (
          <ZBtn
            onClick={() => setView(fitView(tipPoints, 60))}
            title="auto-zoom a la zona de las puntas (triángulo de caída)"
          >◎ PUNTA</ZBtn>
        )}
        <ZBtn onClick={() => zoomAt(w / 2, H / 2, 1.6)} title="acercar">+</ZBtn>
        <ZBtn onClick={() => zoomAt(w / 2, H / 2, 1 / 1.6)} title="alejar">−</ZBtn>
        <span style={{ fontFamily: MONO, fontSize: 10, color: C.muted, marginLeft: 'auto' }}>
          zoom ×{zoomRelFit >= 100 ? Math.round(zoomRelFit) : round(zoomRelFit, 2)}
        </span>
      </div>
      <svg
        ref={svgRef}
        viewBox={`0 0 ${w} ${H}`} width="100%" height={H}
        style={{ display: 'block', touchAction: 'none', cursor: 'grab', borderRadius: 4 }}
        onPointerDown={onPointerDown} onPointerMove={onPointerMove}
        onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
      >
        <rect x="0" y="0" width={w} height={H} fill={C.bg} />
        {gridV.map((x, i) => {
          const s = toS(x, 0);
          return <line key={`gv${i}`} x1={s.x} y1="0" x2={s.x} y2={H} stroke={C.border} strokeWidth="0.6" opacity="0.55" />;
        })}
        {gridH.map((y, i) => {
          const s = toS(0, y);
          return <line key={`gh${i}`} x1="0" y1={s.y} x2={w} y2={s.y} stroke={C.border} strokeWidth="0.6" opacity="0.55" />;
        })}
        {org.y >= 0 && org.y <= H && <line x1="0" y1={org.y} x2={w} y2={org.y} stroke={C.borderLit} strokeWidth="1" />}
        {org.x >= 0 && org.x <= w && <line x1={org.x} y1="0" x2={org.x} y2={H} stroke={C.borderLit} strokeWidth="1" />}
        {org.x >= -6 && org.x <= w + 6 && org.y >= -6 && org.y <= H + 6 && (
          <circle cx={org.x} cy={org.y} r="3" fill={C.muted} />
        )}

        {arcs.map((a, i) => {
          const c = toS(a.cx, a.cy);
          const sa = -a.a1, ea = -a.a2; // pantalla: eje y invertido
          const p1 = { x: c.x + a.rPx * Math.cos(sa), y: c.y + a.rPx * Math.sin(sa) };
          const p2 = { x: c.x + a.rPx * Math.cos(ea), y: c.y + a.rPx * Math.sin(ea) };
          const delta = a.a2 - a.a1;
          const sweep = delta >= 0 ? 0 : 1;
          const large = Math.abs(delta) > Math.PI ? 1 : 0;
          const mid = -(a.a1 + delta / 2);
          const lp = { x: c.x + (a.rPx + 14) * Math.cos(mid), y: c.y + (a.rPx + 14) * Math.sin(mid) };
          if (Math.abs(delta) < 1e-7) return null;
          return (
            <g key={`arc${i}`}>
              <path d={`M ${p1.x} ${p1.y} A ${a.rPx} ${a.rPx} 0 ${large} ${sweep} ${p2.x} ${p2.y}`}
                fill="none" stroke={a.color} strokeWidth="1.3" opacity="0.9" />
              <text x={lp.x} y={lp.y} fill={a.color} fontSize="11" fontFamily={MONO} textAnchor="middle">{a.label}</text>
            </g>
          );
        })}

        {finiteSegs.map((s, i) => {
          const a = toS(s.x1, s.y1), b = toS(s.x2, s.y2);
          const lenPx = Math.hypot(b.x - a.x, b.y - a.y);
          if (lenPx < 0.8) {
            return <circle key={i} cx={b.x} cy={b.y} r="3.5" fill={s.color} />;
          }
          const head = arrowHeadPts(a.x, a.y, b.x, b.y, Math.min(9, lenPx * 0.4), 6.5);
          const lx = s.labelAt === 'mid' ? (a.x + b.x) / 2 : b.x;
          const ly = s.labelAt === 'mid' ? (a.y + b.y) / 2 : b.y;
          return (
            <g key={i}>
              <line x1={a.x} y1={a.y} x2={head.base.x} y2={head.base.y}
                stroke={s.color} strokeWidth={s.width || 2} opacity={s.opacity ?? 0.9}
                strokeDasharray={s.dash || 'none'} />
              <polygon
                points={`${head.tip.x},${head.tip.y} ${head.p2.x},${head.p2.y} ${head.p3.x},${head.p3.y}`}
                fill={s.color}
                style={(s.glow && C.glow) ? { filter: `drop-shadow(0 0 4px ${s.color})` } : undefined}
              />
              {s.label && <text x={lx + 7} y={ly - 7} fill={s.color} fontSize="11" fontFamily={MONO}>{s.label}</text>}
            </g>
          );
        })}

        <g>
          <line x1="14" y1={H - 16} x2={14 + barPx} y2={H - 16} stroke={C.muted} strokeWidth="2" />
          <line x1="14" y1={H - 20} x2="14" y2={H - 12} stroke={C.muted} strokeWidth="1.4" />
          <line x1={14 + barPx} y1={H - 20} x2={14 + barPx} y2={H - 12} stroke={C.muted} strokeWidth="1.4" />
          <text x={14 + barPx / 2} y={H - 23} fill={C.muted} fontSize="10" fontFamily={MONO} textAnchor="middle">
            {fmtN(barUnits)} {unit}
          </text>
        </g>
      </svg>
      <div style={{ fontFamily: MONO, fontSize: 10, color: C.muted, marginTop: 6, lineHeight: 1.5 }}>
        rueda / pellizco = zoom · arrastrar = paneo{note ? ` · ${note}` : ''}
      </div>
    </div>
  );
}

/* Constructores de segmentos para los dos estilos clásicos de diagrama */
function originSegments(points) {
  return points.map((p) => ({
    x1: 0, y1: 0, x2: p.value.re, y2: p.value.im,
    color: p.color, label: p.label, labelAt: 'tip',
    dash: p.dash || null, glow: !!p.glow, width: p.width || 1.8,
  }));
}
function chainSegments(points) {
  const segs = [];
  let acc = math.complex(0, 0);
  points.forEach((p) => {
    const ok = isFinite(p.value.re) && isFinite(p.value.im);
    const next = ok ? math.add(acc, p.value) : acc;
    segs.push({ x1: acc.re, y1: acc.im, x2: next.re, y2: next.im, color: p.color, label: p.label, labelAt: 'mid', width: 2 });
    acc = next;
  });
  return { segs, resultant: acc };
}

/* ============================== MÓDULO: REGULACIÓN / MÁQUINA ==============================
   Construcción fasorial de V₁ = V₂ + I·(R + jX) — el diagrama de regulación de un
   transformador o línea corta, o de una máquina síncrona (E = V + I·(Ra + jXs)).
   La corriente se dibuja en escala independiente (voltios y amperios no comparten escala),
   se trazan los arcos de φ (factor de potencia) y δ (ángulo entre V₁ y V₂), y el botón
   "PUNTA" del lienzo enfoca el triángulo de caída I·R / I·jX que a escala completa es
   invisible cuando δ es de décimas de grado. */
function RegulationModule() {
  const [machine, setMachine] = useState('trafo'); // 'trafo' | 'sync'
  const [v2m, setV2m] = useState('2400'); const [v2a, setV2a] = useState('0');
  const [im, setIm] = useState('20.8'); const [ia, setIa] = useState('-36.87');
  const [rStr, setRStr] = useState('1.4276'); const [xStr, setXStr] = useState('1.8161');

  const isSync = machine === 'sync';
  const nameRef = isSync ? 'V' : 'V₂';    // fasor de referencia
  const nameRes = isSync ? 'E' : 'V₁';    // fasor resultante
  const nameR = isSync ? 'I·Ra' : 'I·R';
  const nameX = isSync ? 'I·jXs' : 'I·jX';

  const nums = [v2m, v2a, im, ia, rStr, xStr].map((s) => parseFloat(s === '' ? 'NaN' : s));
  const bad = nums.some((n) => isNaN(n));
  const [V2M, V2A, IM, IA, R, X] = nums;

  let V2 = math.complex(0, 0), I = math.complex(0, 0), VR = math.complex(0, 0), VX = math.complex(0, 0), V1 = math.complex(0, 0);
  let reg = 0, phi = 0, delta = 0, fp = 1;
  if (!bad) {
    V2 = math.complex({ r: V2M, phi: toRad(V2A) });
    I = math.complex({ r: IM, phi: toRad(IA) });
    VR = math.multiply(I, R);
    VX = math.multiply(I, math.complex(0, X));
    V1 = math.add(V2, math.add(VR, VX));
    reg = math.abs(V2) > 0 ? ((math.abs(V1) - math.abs(V2)) / math.abs(V2)) * 100 : 0;
    phi = toDeg(math.arg(V2) - math.arg(I)); // >0 → corriente en atraso
    delta = toDeg(math.arg(V1) - math.arg(V2));
    fp = Math.cos(toRad(phi));
  }
  const lagging = phi > 0.001, leading = phi < -0.001;

  // segmentos: cadena V₂ → I·R → I·jX, resultante punteado, corriente en escala independiente
  const chainPts = [
    { label: nameRef, value: V2, color: C.amber },
    { label: nameR, value: VR, color: C.sky },
    { label: nameX, value: VX, color: '#C792EA' },
  ];
  const { segs } = chainSegments(chainPts);
  const kI = math.abs(I) > 0 ? (0.35 * Math.max(math.abs(V2), 1e-9)) / math.abs(I) : 1;
  const Iscaled = math.multiply(I, kI);
  const allSegs = bad ? [] : [
    ...segs,
    { x1: 0, y1: 0, x2: V1.re, y2: V1.im, color: C.phosphor, label: nameRes, labelAt: 'tip', dash: '6,4', glow: true, width: 2 },
    { x1: 0, y1: 0, x2: Iscaled.re, y2: Iscaled.im, color: C.danger, label: 'I (esc. indep.)', labelAt: 'tip', dash: '2,4', width: 1.6 },
  ];
  const tipPts = bad ? null : [
    [V2.re, V2.im],
    [V2.re + VR.re, V2.im + VR.im],
    [V1.re, V1.im],
  ];
  const arcs = bad ? [] : [
    { cx: 0, cy: 0, a1: math.arg(I), a2: math.arg(V2), rPx: 44, color: C.danger, label: `φ=${round(phi, 2)}°` },
    { cx: 0, cy: 0, a1: math.arg(V2), a2: math.arg(V1), rPx: 78, color: C.phosphor, label: `δ=${round(delta, 3)}°` },
  ];

  const Field = ({ label, val, set, w = 92, suffix = '' }) => (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
      <span style={{ fontFamily: MONO, fontSize: 10, color: C.muted, letterSpacing: '0.08em' }}>{label}</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
        <input value={val} onChange={(e) => set(e.target.value)} placeholder="0" style={{
          width: w, fontFamily: MONO, fontSize: 13, color: C.text, background: C.bg,
          border: `1px solid ${C.borderLit}`, borderRadius: 3, padding: '7px 8px', outline: 'none',
        }} />
        {suffix && <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>{suffix}</span>}
      </div>
    </label>
  );

  const interp = bad ? '' : isSync
    ? (lagging
        ? `Corriente en ATRASO (φ > 0): la máquina entrega reactivos → generador SOBREEXCITADO (|E| = ${round(math.abs(V1), 2)} > |V| = ${round(math.abs(V2), 2)}).`
        : leading
          ? `Corriente en ADELANTO (φ < 0): la máquina absorbe reactivos → generador SUBEXCITADO.`
          : `FP unitario: la caída I·Xs es casi perpendicular a V; |E| apenas supera |V| y δ domina la geometría.`)
    : (lagging
        ? `Carga inductiva (FP en atraso): I·jX se proyecta a favor de ${nameRef} → regulación positiva (${round(reg, 3)} %).`
        : leading
          ? `Carga capacitiva (FP en adelanto): la caída reactiva puede REDUCIR |${nameRes}| → regulación baja o negativa (efecto Ferranti en líneas).`
          : `FP unitario: solo I·R se proyecta sobre ${nameRef}; regulación mínima para esta corriente.`);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Panel>
        <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
          <Btn active={!isSync} accent={C.amber} onClick={() => setMachine('trafo')}>TRANSFORMADOR / LÍNEA (V₁ = V₂ + I·Z)</Btn>
          <Btn active={isSync} accent={C.sky} onClick={() => setMachine('sync')}>MÁQUINA SÍNCRONA (E = V + I·(Ra+jXs))</Btn>
        </div>
        <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', alignItems: 'flex-end' }}>
          <Field label={`|${nameRef}|`} val={v2m} set={setV2m} suffix="V" />
          <Field label={`∠${nameRef}`} val={v2a} set={setV2a} suffix="°" w={70} />
          <Field label="|I|" val={im} set={setIm} suffix="A" />
          <Field label="∠I" val={ia} set={setIa} suffix="°" w={70} />
          <Field label={isSync ? 'Ra' : 'R'} val={rStr} set={setRStr} suffix="Ω" w={84} />
          <Field label={isSync ? 'Xs' : 'X'} val={xStr} set={setXStr} suffix="Ω" w={84} />
        </div>
        <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginTop: 10 }}>
          convención: ∠I negativo = corriente en atraso respecto a la referencia (carga inductiva)
        </div>
      </Panel>

      {bad ? (
        <Panel><ErrorBox message="Complete todos los campos con valores numéricos." /></Panel>
      ) : (
        <>
          <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr', gap: 16 }}>
            <Panel>
              <Label>Resultados</Label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <div style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '10px 14px' }}>
                  <Tex color={C.muted} size={13}
                    tex={`${texLabel(nameRes)} = ${texLabel(nameRef)} + ${texLabel(nameR)} + ${texLabel(nameX)}`} />
                  <div style={{ marginTop: 4 }}><Tex tex={withUnit(texPolar(V1), 'V')} color={C.phosphor} size={20} /></div>
                  <div style={{ marginTop: 2 }}><Tex tex={withUnit(texComplex(V1), 'V')} color={C.muted} size={13} /></div>
                </div>
                <div style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '10px 14px', fontFamily: MONO, fontSize: 13, color: C.text, lineHeight: 1.9 }}>
                  <div><Tex tex={`${texLabel(nameR)} = ${withUnit(texPolar(VR), 'V')}`} color={C.text} size={14} /></div>
                  <div><Tex tex={`${texLabel(nameX)} = ${withUnit(texPolar(VX), 'V')}`} color={C.text} size={14} /></div>
                  <div><Tex color={C.danger} size={14}
                    tex={`\\varphi = ${texNum(phi, 3)}^\\circ \\;\\cdot\\; \\text{FP} = ${texNum(Math.abs(fp), 4)}\\ \\text{${lagging ? '(atraso)' : leading ? '(adelanto)' : '(unitario)'}}`} /></div>
                  <div><Tex tex={`\\delta = ${texNum(delta, 4)}^\\circ`} color={C.phosphor} size={14} /></div>
                  {!isSync && (
                    <div><Tex color={C.amber} size={14}
                      tex={`\\text{Regulación} = \\dfrac{|V_{1}|-|V_{2}|}{|V_{2}|} = ${texNum(reg, 3)}\\,\\%`} /></div>
                  )}
                </div>
                <div style={{ fontFamily: MONO, fontSize: 11.5, color: C.sky, lineHeight: 1.7, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 4, padding: '10px 14px' }}>
                  {interp}
                </div>
              </div>
            </Panel>
            <Panel>
              <Label>Diagrama fasorial — use ◎ PUNTA para ver el triángulo de caída</Label>
              <ZoomPlot
                segments={allSegs}
                arcs={arcs}
                tipPoints={tipPts}
                unit="V"
                height={360}
                note="I se dibuja en escala independiente (A ≠ V), solo su dirección es comparable"
              />
            </Panel>
          </div>
        </>
      )}
    </div>
  );
}


/* ============================== SMALL UI PRIMITIVES ============================== */
function Panel({ children, style }) {
  return (
    <div
      className="qz-panel"
      style={{
        background: C.panel,
        border: `1px solid ${C.border}`,
        borderRadius: 6,
        padding: 16,
        ...style,
      }}
    >
      {children}
    </div>
  );
}
function Label({ children }) {
  return (
    <div style={{ fontFamily: SANS, fontSize: 11, letterSpacing: '0.08em', color: C.muted, textTransform: 'uppercase', marginBottom: 6 }}>
      {children}
    </div>
  );
}
/* variant 'boxed' (por defecto): campo autónomo con su propio borde y fondo, para uso suelto
   en cualquier módulo. variant 'bare': sin borde/fondo propio, pensado para vivir dentro de
   un contenedor que ya aporta esa cápsula visual (ver ComplexPairField). */
function TextField({ value, onChange, placeholder, color, width = 96, variant = 'boxed' }) {
  const [focused, setFocused] = React.useState(false);
  const accent = color || C.phosphor;
  const bare = variant === 'bare';
  return (
    <input
      value={value}
      onChange={(e) => onChange(e.target.value)}
      onFocus={() => setFocused(true)}
      onBlur={() => setFocused(false)}
      placeholder={placeholder}
      style={{
        width,
        boxSizing: 'border-box',
        background: bare ? 'transparent' : C.bg,
        border: bare ? 'none' : `1px solid ${focused ? accent : C.border}`,
        borderRadius: bare ? 0 : 8,
        color: color || C.text,
        fontFamily: MONO,
        fontSize: 14,
        padding: bare ? '4px 2px' : '8px 10px',
        outline: 'none',
        boxShadow: !bare && focused ? `0 0 0 3px ${hexToRgba(accent, 0.16)}` : 'none',
        transition: 'border-color 160ms ease, box-shadow 160ms ease, background 160ms ease',
      }}
    />
  );
}
function Btn({ children, onClick, active, accent }) {
  const bg = active ? (accent || C.phosphor) : 'transparent';
  const fg = active ? C.bg : (accent || C.text);
  return (
    <button
      onClick={onClick}
      style={{
        fontFamily: MONO,
        fontSize: 13,
        padding: '8px 14px',
        borderRadius: 7,
        border: `1px solid ${active ? (accent || C.phosphor) : C.border}`,
        background: bg,
        color: fg,
        cursor: 'pointer',
        transition: 'all 140ms ease',
        whiteSpace: 'nowrap',
      }}

/* LaTeX vía KaTeX; si KaTeX no cargó, cae a texto monoespaciado sin romper nada. */
function Tex({ tex, display = false, color, size }) {
  const src = tex == null ? '' : String(tex);
  let html = null;
  try {
    if (typeof katex !== 'undefined') html = katex.renderToString(src, { displayMode: display, throwOnError: false, output: 'htmlAndMathml' });
  } catch (e) { html = null; }
  if (html === null) return <span style={{ fontFamily: MONO, color, fontSize: size }}>{src}</span>;
  return <span style={{ color, fontSize: size, display: display ? 'block' : 'inline-block' }} dangerouslySetInnerHTML={{ __html: html }} />;
}

/* ============================== CIRCUIT MODULE (SERIE / PARALELO) ============================== */
/* ============================== PARSER DE EXPRESIONES COMPLEJAS ==============================
   Evaluador de expresiones aritméticas sobre números complejos con notación de ingeniería:
     · literales rectangulares:  13-5j+10   ·   4+j3   ·   j   ·   2.5e3
     · literales polares:        20.8∠-36.87   (también acepta "<" en vez de "∠", y "°" opcional)
     · operadores:  +  −  *  /  ∥ (paralelo; también "//" o "||")  y paréntesis
     · variables Z1…Zn cuando se le pasa un alcance (módulo de impedancias)
   Precedencia (de mayor a menor):  * /  →  ∥  →  + −
   Es decir, Z1+Z2∥Z3 se lee como Z1+(Z2∥Z3), igual que la convención de circuitos.
   Implementación: descenso recursivo — gramática pequeña, errores en español con posición. */
function par2(a, b) {
  if (math.abs(a) === 0 || math.abs(b) === 0) return math.complex(0, 0); // rama en corto
  const den = math.add(a, b);
  if (math.abs(den) === 0) throw new Error('Paralelo indefinido: Za + Zb = 0 (resonancia ideal, Zeq → ∞)');
  return math.divide(math.multiply(a, b), den);
}

function tokenizeZ(srcRaw) {
  let s = String(srcRaw).replace(/\|\|/g, '∥').replace(/\/\//g, '∥').replace(/\s+/g, '');
  // normaliza signo menos tipográfico y ohm decorativo
  s = s.replace(/−/g, '-').replace(/[ΩΩω]|ohm/gi, '');
  const tokens = [];
  const re = /(\d+\.?\d*(?:[eE][+-]?\d+)?|\.\d+(?:[eE][+-]?\d+)?)|([jJiI])|([zZ]\d+)|(∠|<)|(°)|([+\-*/()∥])/g;
  let m, last = 0;
  while ((m = re.exec(s)) !== null) {
    if (m.index !== last) throw new Error(`Símbolo no reconocido: "${s.slice(last, m.index)}" (posición ${last + 1})`);
    if (m[1] !== undefined) tokens.push({ t: 'num', v: parseFloat(m[1]) });
    else if (m[2] !== undefined) tokens.push({ t: 'j' });
    else if (m[3] !== undefined) tokens.push({ t: 'var', v: m[3].toUpperCase() });
    else if (m[4] !== undefined) tokens.push({ t: 'ang' });
    else if (m[5] !== undefined) { /* ° decorativo: se ignora */ }
    else tokens.push({ t: m[6] });
    last = re.lastIndex;
  }
  if (last !== s.length) throw new Error(`Símbolo no reconocido: "${s.slice(last)}" (posición ${last + 1})`);
  return tokens;
}

/* evalZExpr(cadena, alcance) → math.Complex
   alcance: objeto { Z1: Complex, Z2: Complex, ... } o vacío para celdas de matriz. */
function evalZExpr(src, scope = {}) {
  const toks = tokenizeZ(src);
  if (toks.length === 0) throw new Error('Expresión vacía');
  let pos = 0;
  const peek = () => toks[pos];
  const eat = (t) => {
    if (!toks[pos] || toks[pos].t !== t) throw new Error(`Se esperaba "${t}" y se encontró ${toks[pos] ? `"${toks[pos].t === 'num' ? toks[pos].v : toks[pos].t === 'var' ? toks[pos].v : toks[pos].t}"` : 'fin de la expresión'}`);
    return toks[pos++];
  };

  function primary() {
    const tk = peek();
    if (!tk) throw new Error('Expresión incompleta: falta un valor al final');
    if (tk.t === '(') {
      eat('(');
      const v = addLevel();
      eat(')');
      return v;
    }
    if (tk.t === 'j') { eat('j'); // j solo, o j3 (estilo 4+j3)
      const nxt = peek();
      if (nxt && nxt.t === 'num') { eat('num'); return math.complex(0, nxt.v); }
      return math.complex(0, 1);
    }
    if (tk.t === 'var') {
      eat('var');
      if (!(tk.v in scope)) throw new Error(`${tk.v} no está definida en la lista de impedancias`);
      return scope[tk.v];
    }
    if (tk.t === 'num') {
      eat('num');
      const nxt = peek();
      if (nxt && nxt.t === 'j') { eat('j'); return math.complex(0, tk.v); }        // 5j
      if (nxt && nxt.t === 'ang') {                                                 // 5∠30 | 5∠-30
        eat('ang');
        let sign = 1;
        if (peek() && peek().t === '-') { eat('-'); sign = -1; }
        else if (peek() && peek().t === '+') { eat('+'); }
        const ang = eat('num');
        return math.complex({ r: tk.v, phi: toRad(sign * ang.v) });
      }
      return math.complex(tk.v, 0);
    }
    throw new Error(`Valor inesperado: "${tk.t}"`);
  }

  function unary() {
    if (peek() && peek().t === '-') { eat('-'); return math.multiply(unary(), -1); }
    if (peek() && peek().t === '+') { eat('+'); return unary(); }
    return primary();
  }

  function mulLevel() {
    let v = unary();
    while (peek() && (peek().t === '*' || peek().t === '/')) {
      const op = eat(peek().t).t;
      const r = unary();
      if (op === '/') {
        if (math.abs(r) === 0) throw new Error('División entre cero');
        v = math.divide(v, r);
      } else v = math.multiply(v, r);
    }
    return v;
  }

  function parLevel() {
    let v = mulLevel();
    while (peek() && peek().t === '∥') {
      eat('∥');
      v = par2(v, mulLevel());
    }
    return v;
  }

  function addLevel() {
    let v = parLevel();
    while (peek() && (peek().t === '+' || peek().t === '-')) {
      const op = eat(peek().t).t;
      const r = parLevel();
      v = op === '+' ? math.add(v, r) : math.subtract(v, r);
    }
    return v;
  }

  const result = addLevel();
  if (pos !== toks.length) throw new Error(`Sobra texto a partir de "${toks[pos].t === 'num' ? toks[pos].v : toks[pos].t}"`);
  if (!isFinite(result.re) || !isFinite(result.im)) throw new Error('El resultado no es finito');
  return result;
}

/* ============================== MÓDULO: CIRCUITO POR EXPRESIÓN ==============================
   Topologías arbitrarias serie/paralelo escritas como expresión con paréntesis:
   (Z1+Z2)∥Z3 + (Z4+Z5)∥Z6 — el caso que el modo paso a paso no puede representar,
   porque ahí cada Z nueva se combina contra TODO lo acumulado. Las expresiones también
   admiten literales numéricos mezclados con las variables: (Z1+Z2)∥(10+5j). */
function CircuitExprModule() {
  const [items, setItems] = useState([
    { id: 1, re: '10', im: '5' }, { id: 2, re: '4', im: '-3' },
    { id: 3, re: '8', im: '0' }, { id: 4, re: '2', im: '6' },
    { id: 5, re: '5', im: '-1' }, { id: 6, re: '12', im: '3' },
  ]);
  const [nextId, setNextId] = useState(7);
  const [inputMode, setInputMode] = useState('rect');
  const [expr, setExpr] = useState('(Z1+Z2)∥Z3 + (Z4+Z5)∥Z6');
  const exprRef = React.useRef(null);

  const addImpedance = () => {
    if (items.length >= 12) return;
    setItems((its) => [...its, { id: nextId, re: '', im: '' }]);
    setNextId((n) => n + 1);
  };
  const removeImpedance = (id) => {
    if (items.length <= 1) return;
    setItems((its) => its.filter((it) => it.id !== id));
  };
  const updateItem = (id, field, value) => {
    setItems((its) => its.map((it) => (it.id === id ? { ...it, [field]: value } : it)));
  };
  const changeInputMode = (newMode) => {
    if (newMode === inputMode) return;
    setItems((its) => its.map((it) => {
      const z = complexFromPair(inputMode, it.re, it.im);
      const [a, b] = pairFromComplex(newMode, z || math.complex(0, 0));
      return { ...it, re: a, im: b };
    }));
    setInputMode(newMode);
  };

  // inserta texto en la posición del cursor del campo de expresión
  const insertAtCursor = (text) => {
    const el = exprRef.current;
    if (!el) { setExpr((e) => e + text); return; }
    const start = el.selectionStart ?? expr.length;
    const end = el.selectionEnd ?? expr.length;
    const next = expr.slice(0, start) + text + expr.slice(end);
    setExpr(next);
    requestAnimationFrame(() => {
      el.focus();
      el.setSelectionRange(start + text.length, start + text.length);
    });
  };

  let parseError = '';
  const scope = {};
  items.forEach((it, i) => {
    if (parseError) return;
    const z = complexFromPair(inputMode, it.re, it.im);
    if (z === null) { parseError = `Valor inválido en Z${i + 1}`; return; }
    scope[`Z${i + 1}`] = z;
  });

  let equivalent = null, exprError = '';
  if (!parseError && expr.trim() !== '') {
    try { equivalent = evalZExpr(expr, scope); }
    catch (e) { exprError = e.message; }
  }
  const admittance = (equivalent && math.abs(equivalent) !== 0) ? math.divide(math.complex(1, 0), equivalent) : null;

  const argandPoints = [
    ...items.map((it, i) => ({
      label: `Z${i + 1}`,
      value: complexFromPair(inputMode, it.re, it.im) || math.complex(0, 0),
      color: circuitColor(i),
    })),
    ...(equivalent ? [{ label: 'Zeq', value: equivalent, color: C.phosphor, dash: '6,4', glow: true }] : []),
  ];
  const tipPts = argandPoints.map((p) => [p.value.re, p.value.im]).filter((pt) => pt.every(isFinite));

  const InsBtn = ({ text, show }) => (
    <button onClick={() => insertAtCursor(text)} style={{
      fontFamily: MONO, fontSize: 12, padding: '5px 10px', background: 'transparent',
      border: `1px solid ${C.borderLit}`, borderRadius: 3, color: C.text, cursor: 'pointer',
    }}>{show || text}</button>
  );

  return (
    <>
      <Panel>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, flexWrap: 'wrap', gap: 10 }}>
          <Label>Impedancias disponibles</Label>
          <ModeToggle mode={inputMode} onChange={changeInputMode} />
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {items.map((it, i) => (
            <div key={it.id} className="qz-item-row" style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <span style={{ fontFamily: MONO, fontSize: 12, color: circuitColor(i), width: 26 }}>
                Z{i + 1}
              </span>
              <ComplexPairField
                mode={inputMode}
                aVal={it.re} bVal={it.im}
                onA={(v) => updateItem(it.id, 're', v)} onB={(v) => updateItem(it.id, 'im', v)}
                color={circuitColor(i)} width={78} unitSuffix=" Ω"
              />
              <button
                onClick={() => removeImpedance(it.id)}
                disabled={items.length <= 1}
                style={{
                  marginLeft: 6, width: 24, height: 24, borderRadius: 3,
                  border: `1px solid ${C.border}`, background: 'transparent',
                  color: items.length <= 1 ? C.border : C.danger, fontFamily: MONO,
                  cursor: items.length <= 1 ? 'default' : 'pointer', lineHeight: 1,
                }}
              >×</button>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 12 }}>
          <Btn onClick={addImpedance}>+ AGREGAR IMPEDANCIA</Btn>
          {items.length >= 12 && <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginLeft: 10 }}>límite de 12</span>}
        </div>
      </Panel>

      <Panel>
        <Label>Expresión de la red (∥ = paralelo, también sirve "//" o "||")</Label>
        <input
          ref={exprRef}
          value={expr}
          onChange={(e) => setExpr(e.target.value)}
          spellCheck={false}
          placeholder="(Z1+Z2)∥Z3 + (Z4+Z5)∥Z6"
          style={{
            width: '100%', boxSizing: 'border-box', fontFamily: MONO, fontSize: 16,
            color: C.text, background: C.bg, border: `1px solid ${exprError ? C.danger : C.borderLit}`,
            borderRadius: 4, padding: '11px 13px', outline: 'none', marginTop: 8,
          }}
        />
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 10, alignItems: 'center' }}>
          <span style={{ fontFamily: MONO, fontSize: 10, color: C.muted }}>insertar:</span>
          <InsBtn text="+" />
          <InsBtn text="∥" />
          <InsBtn text="(" />
          <InsBtn text=")" />
          {items.map((_, i) => i < 8 && <InsBtn key={i} text={`Z${i + 1}`} />)}
        </div>
        <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginTop: 10, lineHeight: 1.7 }}>
          precedencia: * / → ∥ → + −  (Z1+Z2∥Z3 se lee Z1+(Z2∥Z3); use paréntesis en caso de duda)
          <br />también acepta literales: (Z1+Z2)∥(10+5j) · Z1+8∠30 · 3*Z2
        </div>
      </Panel>

      <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
        <Panel>
          <Label>Impedancia equivalente de la expresión</Label>
          {parseError ? (
            <ErrorBox message={parseError} />
          ) : exprError ? (
            <ErrorBox message={exprError} />
          ) : equivalent ? (
            <div style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '12px 14px' }}>
              <Tex tex={withUnit(texComplex(equivalent), 'Ω')} color={C.phosphor} size={22} />
              <div style={{ marginTop: 4 }}><Tex tex={withUnit(texPolar(equivalent), 'Ω')} color={C.muted} size={13} /></div>
              {admittance && (
                <div style={{ marginTop: 10 }}>
                  <Tex tex={`Y_{eq}=${withUnit(texComplex(admittance, 6), 'S')}\\;\\cdot\\;${withUnit(texPolar(admittance), 'S')}`} color={C.sky} size={13} />
                </div>
              )}
              <div style={{ fontFamily: MONO, fontSize: 11, color: math.abs(equivalent) !== 0 && equivalent.im >= 0 ? C.amber : C.sky, marginTop: 8 }}>
                {equivalent.im > 1e-9 ? 'carácter inductivo (X > 0)' : equivalent.im < -1e-9 ? 'carácter capacitivo (X < 0)' : 'puramente resistiva'}
              </div>
            </div>
          ) : (
            <div style={{ fontFamily: MONO, fontSize: 12, color: C.muted }}>Escriba una expresión para calcular.</div>
          )}
        </Panel>
        <Panel>
          <Label>Diagrama de Argand</Label>
          <ZoomPlot segments={originSegments(argandPoints)} tipPoints={tipPts} unit="Ω" height={280} />
        </Panel>
      </div>
    </>
  );
}


function CircuitModule() {

  const [items, setItems] = useState([
    { id: 1, re: '10', im: '5' },
    { id: 2, re: '4', im: '-3' },
  ]);
  const [nextId, setNextId] = useState(3);
  const [combMode, setCombMode] = useState('serie'); // serie | paralelo
  const [inputMode, setInputMode] = useState('rect'); // rect | polar

  const addImpedance = () => {
    if (items.length >= 8) return;
    setItems((its) => [...its, { id: nextId, re: '', im: '' }]);
    setNextId((n) => n + 1);
  };
  const removeImpedance = (id) => {
    if (items.length <= 1) return;
    setItems((its) => its.filter((it) => it.id !== id));
  };
  const updateItem = (id, field, value) => {
    setItems((its) => its.map((it) => (it.id === id ? { ...it, [field]: value } : it)));
  };
  const changeInputMode = (newMode) => {
    if (newMode === inputMode) return;
    setItems((its) => its.map((it) => {
      const z = complexFromPair(inputMode, it.re, it.im);
      const [a, b] = pairFromComplex(newMode, z || math.complex(0, 0));
      return { ...it, re: a, im: b };
    }));
    setInputMode(newMode);
  };

  let values = [];
  let parseError = '';
  items.forEach((it, i) => {
    if (parseError) return;
    const z = complexFromPair(inputMode, it.re, it.im);
