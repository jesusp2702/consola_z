    values.push(z);
  });

  let equivalent = null, eqError = '';
  if (!parseError) {
    try { equivalent = combMode === 'serie' ? seriesEq(values) : parallelEq(values); }
    catch (e) { eqError = e.message; }
  }
  const admittance = (equivalent && math.abs(equivalent) !== 0) ? math.divide(math.complex(1, 0), equivalent) : null;

  const argandPoints = [
    ...items.map((it, i) => {
      const z = complexFromPair(inputMode, it.re, it.im) || math.complex(0, 0);
      return { label: `Z${i + 1}`, value: z, color: circuitColor(i) };
    }),
    ...(equivalent ? [{ label: 'Zeq', value: equivalent, color: C.phosphor }] : []),
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        <Btn active={structMode === 'expr'} onClick={() => setStructMode('expr')}>EXPRESIÓN CON PARÉNTESIS</Btn>
        <Btn active={structMode === 'simple'} onClick={() => setStructMode('simple')}>SOLO SERIE o SOLO PARALELO</Btn>
      </div>

      {structMode === 'expr' ? (
        <CircuitExprModule />
      ) : (
      <>
      <Panel>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, flexWrap: 'wrap', gap: 10 }}>
          <Label>Conexión</Label>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn active={combMode === 'serie'} onClick={() => setCombMode('serie')}>SERIE</Btn>
            <Btn active={combMode === 'paralelo'} onClick={() => setCombMode('paralelo')}>PARALELO</Btn>
          </div>
          <ModeToggle mode={inputMode} onChange={changeInputMode} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {items.map((it, i) => (
            <div key={it.id} className="qz-item-row" style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <span style={{ fontFamily: MONO, fontSize: 12, color: circuitColor(i), width: 26 }}>
                Z{i + 1}
              </span>
              <ComplexPairField
                mode={inputMode}
                aVal={it.re} bVal={it.im}
                onA={(v) => updateItem(it.id, 're', v)} onB={(v) => updateItem(it.id, 'im', v)}
                color={circuitColor(i)} width={78} unitSuffix=" Ω"
              />
              <button
                onClick={() => removeImpedance(it.id)}
                disabled={items.length <= 1}
                style={{
                  marginLeft: 6, width: 24, height: 24, borderRadius: 3,
                  border: `1px solid ${C.border}`, background: 'transparent',
                  color: items.length <= 1 ? C.border : C.danger, fontFamily: MONO,
                  cursor: items.length <= 1 ? 'default' : 'pointer', lineHeight: 1,
                }}
              >×</button>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 12 }}>
          <Btn onClick={addImpedance}>+ AGREGAR IMPEDANCIA</Btn>
        </div>
      </Panel>

      <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
        <Panel>
          <Label>
            Impedancia equivalente ({combMode === 'serie' ? 'Zeq = Z1 + Z2 + …' : '1/Zeq = 1/Z1 + 1/Z2 + …'})
          </Label>
          {parseError ? (
            <ErrorBox message={parseError} />
          ) : eqError ? (
            <ErrorBox message={eqError} />
          ) : (
            <div style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '12px 14px' }}>
              <Tex tex={withUnit(texComplex(equivalent), 'Ω')} color={C.phosphor} size={22} />
              <div style={{ marginTop: 4 }}><Tex tex={withUnit(texPolar(equivalent), 'Ω')} color={C.muted} size={13} /></div>
              {admittance && (
                <div style={{ marginTop: 10 }}>
                  <Tex tex={`Y_{eq}=${withUnit(texComplex(admittance, 6), 'S')}\\;\\cdot\\;${withUnit(texPolar(admittance), 'S')}`} color={C.sky} size={13} />
                </div>
              )}
            </div>
          )}
        </Panel>

        <Panel>
          <Label>Diagrama de Argand</Label>
          <Argand points={argandPoints} />
        </Panel>
      </div>
      </>
      )}
    </div>
  );
}

/* ============================== MÓDULO: CRECIMIENTO PASO A PASO (ESTILO LIBRO DE TEXTO) ==============================
   Se parte de Z1. En cada paso siguiente se agrega una impedancia nueva y se decide si se
   combina EN SERIE o EN PARALELO con todo lo que ya se acumuló. La expresión simbólica se
   muestra creciendo con sus paréntesis, y debajo un desglose fila por fila con el valor
   numérico de cada etapa — igual que se vería la resolución en un libro de texto. */

function ComponentsModule() {
  const [freqMode, setFreqMode] = useState('f'); // 'f' (Hz) | 'w' (rad/s)
  const [freqVal, setFreqVal] = useState('60');
  const [items, setItems] = useState([
    { id: 1, kind: 'R', value: '100', combine: null },
    { id: 2, kind: 'L', value: '50', combine: 'serie' },
  ]);
  const [nextId, setNextId] = useState(3);

  const fNum = parseFloat(freqVal);
  const freqValid = !isNaN(fNum) && fNum > 0;
  const omega = freqValid ? (freqMode === 'f' ? 2 * Math.PI * fNum : fNum) : null;
  const fHz = freqValid ? (freqMode === 'f' ? fNum : fNum / (2 * Math.PI)) : null;

  const addItem = (combine) => {
    if (items.length >= 10) return;
    setItems((its) => [...its, { id: nextId, kind: 'R', value: '', combine }]);
    setNextId((n) => n + 1);
  };
  const removeItem = (id) => {
    setItems((its) => {
      if (its.length <= 1) return its;
      const idx = its.findIndex((it) => it.id === id);
      if (idx === -1) return its;
      const rest = its.filter((it) => it.id !== id);
      if (idx === 0) rest[0] = { ...rest[0], combine: null };
      return rest;
    });
  };
  const updateKind = (id, kind) => setItems((its) => its.map((it) => (it.id === id ? { ...it, kind } : it)));
  const updateValue = (id, value) => setItems((its) => its.map((it) => (it.id === id ? { ...it, value } : it)));
  const updateCombine = (id, combine) => setItems((its) => its.map((it) => (it.id === id ? { ...it, combine } : it)));

  const unitFor = (kind) => (kind === 'R' ? 'Ω' : kind === 'L' ? 'mH' : 'µF');

  let trace = [], traceError = '';
  if (!freqValid) {
    traceError = 'Ingresa una frecuencia mayor que 0 para calcular las reactancias.';
  } else {
    try { trace = computeComponentTrace(items, omega); }
    catch (e) { traceError = e.message; }
  }

  const final = trace.length ? trace[trace.length - 1] : null;
  const equivalent = final ? final.value : null;
  const admittance = (equivalent && math.abs(equivalent) !== 0) ? math.divide(math.complex(1, 0), equivalent) : null;

  const argandPoints = [
    ...trace.map((row, i) => ({ label: row.label, value: row.z, color: circuitColor(i) })),
    ...(equivalent ? [{ label: 'Zeq', value: equivalent, color: C.phosphor }] : []),
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Panel>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10, marginBottom: 10 }}>
          <Label>Frecuencia de trabajo</Label>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn active={freqMode === 'f'} accent={C.amber} onClick={() => setFreqMode('f')}>f (Hz)</Btn>
            <Btn active={freqMode === 'w'} accent={C.sky} onClick={() => setFreqMode('w')}>ω (rad/s)</Btn>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          <TextField value={freqVal} onChange={setFreqVal} placeholder={freqMode === 'f' ? 'f' : 'ω'} width={100} />
          <span style={{ fontFamily: MONO, fontSize: 12, color: C.muted }}>{freqMode === 'f' ? 'Hz' : 'rad/s'}</span>
          {freqValid && (
            <span style={{ fontFamily: MONO, fontSize: 12, color: C.muted }}>
              {freqMode === 'f' ? `→ ω = 2πf = ${round(omega, 3)} rad/s` : `→ f = ω / 2π = ${round(fHz, 3)} Hz`}
            </span>
          )}
        </div>
        {!freqValid && <ErrorBox message="La frecuencia debe ser un número mayor que 0." />}
      </Panel>

      <Panel>
        <Label>Vaya agregando R (Ω), L (mH) o C (µF) — cada nuevo elemento se combina con TODO lo acumulado, en serie o en paralelo</Label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 10 }}>
          {items.map((it, i) => (
            <div key={it.id} style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {i > 0 && (
                <div className="qz-item-row" style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', paddingLeft: 2 }}>
                  <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>se une</span>
                  <Btn active={it.combine !== 'paralelo'} accent={C.amber} onClick={() => updateCombine(it.id, 'serie')}>SERIE</Btn>
                  <Btn active={it.combine === 'paralelo'} accent={C.sky} onClick={() => updateCombine(it.id, 'paralelo')}>PARALELO</Btn>
                  <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>con lo acumulado</span>
                </div>
              )}
              <div className="qz-item-row" style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                <span style={{ fontFamily: MONO, fontSize: 12, color: circuitColor(i), width: 26 }}>
                  {it.kind}{i + 1}
                </span>
                <div style={{ display: 'flex', gap: 4 }}>
                  <Btn active={it.kind === 'R'} onClick={() => updateKind(it.id, 'R')}>R</Btn>
                  <Btn active={it.kind === 'L'} onClick={() => updateKind(it.id, 'L')}>L</Btn>
                  <Btn active={it.kind === 'C'} onClick={() => updateKind(it.id, 'C')}>C</Btn>
                </div>
                <TextField
                  value={it.value} onChange={(v) => updateValue(it.id, v)}
                  placeholder={unitFor(it.kind)} color={circuitColor(i)} width={78}
                />
                <span style={{ fontFamily: MONO, fontSize: 12, color: C.muted }}>{unitFor(it.kind)}</span>
                <button
                  onClick={() => removeItem(it.id)}
                  disabled={items.length <= 1}
                  style={{
                    marginLeft: 6, width: 24, height: 24, borderRadius: 3,
                    border: `1px solid ${C.border}`, background: 'transparent',
                    color: items.length <= 1 ? C.border : C.danger, fontFamily: MONO,
                    cursor: items.length <= 1 ? 'default' : 'pointer', lineHeight: 1,
                  }}
                >×</button>
              </div>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 14, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <Btn onClick={() => addItem('serie')} accent={C.amber}>+ AGREGAR EN SERIE</Btn>
          <Btn onClick={() => addItem('paralelo')} accent={C.sky}>+ AGREGAR EN PARALELO</Btn>
        </div>
        {items.length >= 10 && (
          <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginTop: 8 }}>Límite de 10 elementos alcanzado.</div>
        )}
      </Panel>

      <Panel>
        <Label>Expresión acumulada</Label>
        {traceError ? (
          <ErrorBox message={traceError} />
        ) : (
          <div style={{
            fontFamily: MONO, fontSize: 18, color: C.phosphor, background: C.bg,
            border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '12px 14px',
            overflowX: 'auto', whiteSpace: 'nowrap',
          }}>
            Zeq = {final ? final.expr : '—'}
          </div>
        )}
      </Panel>

      <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
        <Panel>
          <Label>Conversión f → jX y seguimiento del cálculo</Label>
          {!traceError && trace.length > 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
              {trace.map((row, i) => (
                <div key={row.id} style={{
                  display: 'flex', flexDirection: 'column', gap: 2,
                  borderLeft: `3px solid ${row.mode === null ? C.muted : (row.mode === 'serie' ? C.amber : C.sky)}`,
                  paddingLeft: 10,
                }}>
                  <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
                    <span>{row.label} = {row.rawValue || '0'} {unitFor(row.kind)}</span>
                    <Tex color={C.muted} size={11.5}
                      tex={row.kind === 'L' ? '\\rightarrow j\\omega L' : row.kind === 'C' ? '\\rightarrow -\\dfrac{j}{\\omega C}' : '\\text{(resistivo puro)}'} />
                    <span>⇒</span>
                    <Tex tex={withUnit(texComplex(row.z), 'Ω')} color={C.muted} size={11.5} />
                  </div>
                  <div style={{ fontFamily: MONO, fontSize: 13, color: row.id === (final && final.id) ? C.phosphor : C.text }}>
                    {row.expr} = <Tex tex={withUnit(texComplex(row.value), 'Ω')} color={row.id === (final && final.id) ? C.phosphor : C.text} size={13} />
                  </div>
                </div>
              ))}
            </div>
          )}

          {!traceError && equivalent && (
            <div style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '12px 14px' }}>
              <Tex tex={withUnit(texComplex(equivalent), 'Ω')} color={C.phosphor} size={22} />
              <div style={{ marginTop: 4 }}><Tex tex={withUnit(texPolar(equivalent), 'Ω')} color={C.muted} size={13} /></div>
              {admittance && (
                <div style={{ marginTop: 10 }}>
                  <Tex tex={`Y_{eq}=${withUnit(texComplex(admittance, 6), 'S')}\\;\\cdot\\;${withUnit(texPolar(admittance), 'S')}`} color={C.sky} size={13} />
                </div>
              )}
            </div>
          )}
        </Panel>

        <Panel>
          <Label>Diagrama de Argand</Label>
          <Argand points={argandPoints} />
        </Panel>
      </div>
    </div>
  );
}

/* ============================== MÓDULO: FASORES — TENSIONES / CORRIENTES ==============================
   Suma fasores de tensión o corriente (superposición tipo LKV/LKC) preservando magnitud y
   fase de cada uno. El resultado se refleja en dos diagramas: el Argand estándar (todos los
   vectores partiendo del origen, ahora con puntas de flecha) y una construcción punta-cola
   que muestra gráficamente cómo se va acumulando la suma hasta llegar al fasor resultante. */
function PhasorModule() {
  const [kind, setKind] = useState('V'); // 'V' (tensiones) | 'I' (corrientes)
  const [inputMode, setInputMode] = useState('polar'); // rect | polar
  const [convention, setConvention] = useState('rms'); // valores ingresados como pico | rms (solo informativo)
  const [phasors, setPhasors] = useState([
    { id: 1, sign: '+', re: '120', im: '0' },
    { id: 2, sign: '+', re: '120', im: '-120' },
    { id: 3, sign: '+', re: '120', im: '120' },
  ]);
  const [nextId, setNextId] = useState(4);

  const unit = kind === 'V' ? 'V' : 'A';
  const prefix = kind;

  const addPhasor = () => {
    if (phasors.length >= 8) return;
    setPhasors((ps) => [...ps, { id: nextId, sign: '+', re: '', im: '' }]);
    setNextId((n) => n + 1);
  };
  const removePhasor = (id) => {
    if (phasors.length <= 1) return;
    setPhasors((ps) => ps.filter((p) => p.id !== id));
  };
  const updateField = (id, field, value) => {
    setPhasors((ps) => ps.map((p) => (p.id === id ? { ...p, [field]: value } : p)));
  };
  const toggleSign = (id) => {
    setPhasors((ps) => ps.map((p) => (p.id === id ? { ...p, sign: p.sign === '+' ? '−' : '+' } : p)));
  };
  const changeInputMode = (newMode) => {
    if (newMode === inputMode) return;
    setPhasors((ps) => ps.map((p) => {
      const z = complexFromPair(inputMode, p.re, p.im);
      const [a, b] = pairFromComplex(newMode, z || math.complex(0, 0));
      return { ...p, re: a, im: b };
    }));
    setInputMode(newMode);
  };

  let parseError = '';
  const signedValues = phasors.map((p, i) => {
    const z = complexFromPair(inputMode, p.re, p.im);
    if (z === null) { if (!parseError) parseError = `Valor inválido en ${prefix}${i + 1}`; return math.complex(0, 0); }
    return p.sign === '−' ? math.multiply(z, -1) : z;
  });

  const resultant = parseError ? null : signedValues.reduce((acc, z) => math.add(acc, z), math.complex(0, 0));
  const resMag = resultant ? math.abs(resultant) : 0;
  const altMag = convention === 'rms' ? resMag * Math.SQRT2 : resMag / Math.SQRT2;

  const signedLabel = (i) => `${phasors[i].sign === '−' ? '−' : ''}${prefix}${i + 1}`;
  const exprText = phasors
    .map((p, i) => (i === 0 ? signedLabel(i) : ` ${p.sign === '−' ? '−' : '+'} ${prefix}${i + 1}`))
    .join('');

  const chainPoints = phasors.map((p, i) => ({
    label: signedLabel(i), value: signedValues[i], color: circuitColor(i),
  }));
  const argandPoints = [
    ...chainPoints,
    ...(resultant ? [{ label: `${prefix}total`, value: resultant, color: C.phosphor }] : []),
  ];

  /* segmentos para los lienzos con zoom: mismo contenido que Argand/punta-cola clásicos */
  const originSegs = originSegments(argandPoints.map((p) =>
    resultant && p.label === `${prefix}total` ? { ...p, dash: '6,4', glow: true } : p
  ));
  const chainBuild = chainSegments(chainPoints);
  const chainSegsAll = [
    ...chainBuild.segs,
    { x1: 0, y1: 0, x2: chainBuild.resultant.re, y2: chainBuild.resultant.im,
      color: C.phosphor, label: `${prefix}total`, labelAt: 'tip', dash: '6,4', glow: true, width: 2 },
  ];
  const tipPtsOrigin = argandPoints
    .map((p) => [p.value.re, p.value.im])
    .filter((pt) => pt.every(isFinite));
  const tipPtsChain = (() => {
    let acc = math.complex(0, 0); const arr = [];
    chainPoints.forEach((p) => {
      if (isFinite(p.value.re) && isFinite(p.value.im)) acc = math.add(acc, p.value);
      arr.push([acc.re, acc.im]);
    });
    return arr;
  })();

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Panel>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, flexWrap: 'wrap', gap: 10 }}>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn active={kind === 'V'} accent={C.amber} onClick={() => setKind('V')}>TENSIONES (V)</Btn>
            <Btn active={kind === 'I'} accent={C.sky} onClick={() => setKind('I')}>CORRIENTES (I)</Btn>
          </div>
          <ModeToggle mode={inputMode} onChange={changeInputMode} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {phasors.map((p, i) => (
            <div key={p.id} className="qz-item-row" style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <button
                onClick={() => toggleSign(p.id)}
                title="alternar polaridad en la suma"
                style={{
                  width: 26, height: 26, borderRadius: 3,
                  border: `1px solid ${circuitColor(i)}`, background: 'transparent',
                  color: circuitColor(i), fontFamily: MONO, fontSize: 13,
                  cursor: 'pointer', lineHeight: 1,
                }}
              >{p.sign}</button>
              <span style={{ fontFamily: MONO, fontSize: 12, color: circuitColor(i), width: 30 }}>
                {prefix}{i + 1}
              </span>
              <ComplexPairField
                mode={inputMode}
                aVal={p.re} bVal={p.im}
                onA={(v) => updateField(p.id, 're', v)} onB={(v) => updateField(p.id, 'im', v)}
                color={circuitColor(i)} width={78} unitSuffix={` ${unit}`}
              />
              <button
                onClick={() => removePhasor(p.id)}
                disabled={phasors.length <= 1}
                style={{
                  marginLeft: 6, width: 24, height: 24, borderRadius: 3,
                  border: `1px solid ${C.border}`, background: 'transparent',
                  color: phasors.length <= 1 ? C.border : C.danger, fontFamily: MONO,
                  cursor: phasors.length <= 1 ? 'default' : 'pointer', lineHeight: 1,
                }}
              >×</button>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 12, display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          <Btn onClick={addPhasor}>+ AGREGAR {prefix === 'V' ? 'TENSIÓN' : 'CORRIENTE'}</Btn>
          <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>
            el botón +/− de cada fila fija su polaridad al sumar
          </span>
        </div>
        {phasors.length >= 8 && (
          <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginTop: 8 }}>Límite de 8 fasores alcanzado.</div>
        )}
      </Panel>

      <Panel>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10, marginBottom: 6 }}>
          <Label>Suma fasorial</Label>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>valores ingresados en</span>
            <Btn active={convention === 'peak'} onClick={() => setConvention('peak')}>PICO</Btn>
            <Btn active={convention === 'rms'} onClick={() => setConvention('rms')}>RMS</Btn>
          </div>
        </div>
        {parseError ? (
          <ErrorBox message={parseError} />
        ) : (
          <>
            <div style={{
              fontFamily: MONO, fontSize: 16, color: C.text, background: C.bg,
              border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '10px 14px',
              overflowX: 'auto', whiteSpace: 'nowrap', marginBottom: 12,
            }}>
              {prefix}total = {exprText}
            </div>
            <div style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '12px 14px' }}>
              <Tex tex={withUnit(texComplex(resultant), unit)} color={C.phosphor} size={22} />
              <div style={{ marginTop: 4 }}><Tex tex={withUnit(texPolar(resultant), unit)} color={C.muted} size={13} /></div>
              <div style={{ marginTop: 10, fontFamily: MONO, fontSize: 12, color: C.sky }}>
                {convention === 'rms' ? 'valor pico equivalente' : 'valor eficaz (RMS) equivalente'}:{' '}
                <Tex tex={withUnit(texNum(altMag), unit)} color={C.sky} size={13} />
              </div>
            </div>
          </>
        )}
      </Panel>

      <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Panel>
          <Label>Diagrama fasorial (vectores desde el origen)</Label>
          <ZoomPlot segments={originSegs} tipPoints={tipPtsOrigin} unit={unit} height={300} />
        </Panel>
        <Panel>
          <Label>Suma vectorial punta-cola ({prefix}total en línea punteada)</Label>
          <ZoomPlot segments={chainSegsAll} tipPoints={tipPtsChain} unit={unit} height={300} />
        </Panel>
      </div>
    </div>
  );
}

/* ============================== MATRIX GRID INPUT ============================== */
function MatrixGrid({ grid, onCell, color, cellSize = 46 }) {
  return (
    <div style={{ display: 'inline-grid', gridTemplateColumns: `repeat(${grid[0].length}, ${cellSize}px)`, gap: 4 }}>
      {grid.map((row, i) =>
        row.map((val, j) => (
          <input
            key={`${i}-${j}`}
            value={val}
            placeholder="0"
            onChange={(e) => onCell(i, j, e.target.value)}
            style={{
              width: cellSize,
              height: 30,
              background: C.bg,
              border: `1px solid ${C.border}`,
              borderRadius: 3,
              color: color,
              fontFamily: MONO,
              fontSize: 11,
              textAlign: 'center',
              outline: 'none',
              padding: 0,
            }}
            onFocus={(e) => (e.target.style.borderColor = color)}
            onBlur={(e) => (e.target.style.borderColor = C.border)}
          />
        ))
      )}
    </div>
  );
}
function SizeStepper({ label, value, onChange }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
      <span style={{ fontFamily: SANS, fontSize: 11, color: C.muted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{label}</span>
      <button onClick={() => onChange(Math.max(1, value - 1))} style={stepperBtnStyle()}>−</button>
      <span style={{ fontFamily: MONO, fontSize: 14, color: C.text, width: 18, textAlign: 'center' }}>{value}</span>
      <button onClick={() => onChange(Math.min(9, value + 1))} style={stepperBtnStyle()}>+</button>
    </div>
  );
}
function stepperBtnStyle() {
  return { width: 22, height: 22, borderRadius: 3, border: `1px solid ${C.border}`,
    background: 'transparent', color: C.text, fontFamily: MONO, cursor: 'pointer', lineHeight: 1 };
}

function MatrixResultView({ result, error }) {
  if (error) return <ErrorBox message={error} />;
  if (result === null) return <div style={{ color: C.muted, fontFamily: MONO, fontSize: 13 }}>—</div>;
  if (result.kind === 'scalar') {
    return (
      <div>
        <Tex tex={texComplex(result.value)} color={C.phosphor} size={22} />
        <div style={{ marginTop: 4 }}><Tex tex={texPolar(result.value)} color={C.muted} size={13} /></div>
      </div>
    );
  }
  if (result.kind === 'matrix') {
    const M = result.value;
    return (
      <div style={{ display: 'inline-grid', gridTemplateColumns: `repeat(${M[0].length}, minmax(70px, auto))`, gap: 4 }}>
        {M.map((row, i) =>
          row.map((c, j) => (
            <div key={`${i}-${j}`} style={{
              background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 3,
              padding: '4px 6px', fontSize: 12, textAlign: 'center',
            }}>
              <Tex tex={texComplex(c)} color={C.phosphor} size={12} />
            </div>
          ))
        )}
      </div>
    );
  }
  return null;
}

/* ============================== MATRIX MODULE: OPERACIONES A, B ============================== */
function MatrixOpsModule() {
  const [rowsA, setRowsA] = useState(3); const [colsA, setColsA] = useState(3);
  const [rowsB, setRowsB] = useState(3); const [colsB, setColsB] = useState(3);
  const [gridA, setGridA] = useState(makeGrid(3, 3));
  const [gridB, setGridB] = useState(makeGrid(3, 3));
  const [target, setTarget] = useState('A');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const updateRowsA = (v) => { setRowsA(v); setGridA((g) => resizeGrid(g, v, colsA)); };
  const updateColsA = (v) => { setColsA(v); setGridA((g) => resizeGrid(g, rowsA, v)); };
  const updateRowsB = (v) => { setRowsB(v); setGridB((g) => resizeGrid(g, v, colsB)); };
  const updateColsB = (v) => { setColsB(v); setGridB((g) => resizeGrid(g, rowsB, v)); };

  const cellA = (i, j, v) => setGridA((g) => { const ng = g.map((r) => r.slice()); ng[i][j] = v; return ng; });
  const cellB = (i, j, v) => setGridB((g) => { const ng = g.map((r) => r.slice()); ng[i][j] = v; return ng; });

  const run = (fn) => {
    setError('');
    try {
      const out = fn();
      setResult(out);
    } catch (e) {
      setResult(null);
      setError(e.message || 'Error de cálculo');
    }
  };

  const binaryOp = (kind) => run(() => {
    const A = gridToComplex(gridA), B = gridToComplex(gridB);
    if (kind === 'add' || kind === 'sub') {
      if (rowsA !== rowsB || colsA !== colsB) throw new Error('A y B deben tener las mismas dimensiones');
      return { kind: 'matrix', value: kind === 'add' ? math.add(A, B) : math.subtract(A, B) };
    }
    if (kind === 'mul') {
      if (colsA !== rowsB) throw new Error(`Dimensiones incompatibles: A es ${rowsA}×${colsA}, B es ${rowsB}×${colsB}`);
      return { kind: 'matrix', value: math.multiply(A, B) };
    }
  });

  const unaryOp = (kind) => run(() => {
    const grid = target === 'A' ? gridA : gridB;
    const rows = target === 'A' ? rowsA : rowsB;
    const cols = target === 'A' ? colsA : colsB;
    const M = gridToComplex(grid);
    if (kind === 'transpose') return { kind: 'matrix', value: math.transpose(M) };
    if (kind === 'conj') return { kind: 'matrix', value: conjMatrix(M) };
    if (kind === 'ctranspose') return { kind: 'matrix', value: ctranspose(M) };
    if (kind === 'det') {
      if (rows !== cols) throw new Error('El determinante requiere una matriz cuadrada');
      return { kind: 'scalar', value: math.det(M) };
    }
    if (kind === 'inv') {
      if (rows !== cols) throw new Error('La inversa requiere una matriz cuadrada');
      return { kind: 'matrix', value: math.inv(M) };
    }
  });

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Panel>
          <div className="qz-panel-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <Label>Matriz A</Label>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
              <SizeStepper label="Filas" value={rowsA} onChange={updateRowsA} />
              <SizeStepper label="Col" value={colsA} onChange={updateColsA} />
            </div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <MatrixGrid grid={gridA} onCell={cellA} color={C.amber} />
          </div>
        </Panel>

        <Panel>
          <div className="qz-panel-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <Label>Matriz B</Label>
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
              <SizeStepper label="Filas" value={rowsB} onChange={updateRowsB} />
              <SizeStepper label="Col" value={colsB} onChange={updateColsB} />
            </div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <MatrixGrid grid={gridB} onCell={cellB} color={C.sky} />
          </div>
        </Panel>
      </div>

      <Panel>
        <Label>Operaciones binarias (A, B)</Label>
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
          <Btn onClick={() => binaryOp('add')}>A + B</Btn>
          <Btn onClick={() => binaryOp('sub')}>A − B</Btn>
          <Btn onClick={() => binaryOp('mul')}>A × B</Btn>
        </div>

        <Label>Operación sobre una matriz</Label>
        <div style={{ display: 'flex', gap: 8, marginBottom: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          <span style={{ fontFamily: MONO, fontSize: 12, color: C.muted }}>Objetivo:</span>
          <Btn active={target === 'A'} accent={C.amber} onClick={() => setTarget('A')}>A</Btn>
          <Btn active={target === 'B'} accent={C.sky} onClick={() => setTarget('B')}>B</Btn>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          <Btn onClick={() => unaryOp('transpose')}>Transpuesta (Mᵀ)</Btn>
          <Btn onClick={() => unaryOp('conj')}>Conjugada (M̄)</Btn>
          <Btn onClick={() => unaryOp('ctranspose')}>Conj. transpuesta (Mᴴ)</Btn>
          <Btn onClick={() => unaryOp('det')}>Determinante</Btn>
          <Btn onClick={() => unaryOp('inv')}>Inversa (M⁻¹)</Btn>
        </div>
      </Panel>

      <Panel>
        <Label>Resultado</Label>
        <div style={{ overflowX: 'auto' }}>
          <MatrixResultView result={result} error={error} />
        </div>
      </Panel>
    </div>
  );
}

/* ============================== MATRIX MODULE: RESOLVER SISTEMA Mx = B (NODAL / MALLAS) ==============================
   Cierra el círculo del análisis de circuitos: el alumno ya arma la matriz de admitancias
   (nodal) o impedancias (mallas) y el vector de fuentes independientes, y la consola entrega
   directamente el vector de incógnitas x = M⁻¹B — sin que tenga que multiplicar la inversa
   por el vector a mano. Debajo se muestra M·x recalculado como verificación contra B. */
function SystemSolverModule() {
  const [convention, setConvention] = useState('nodal'); // 'nodal' (Y·V = I) | 'mallas' (Z·I = V)
  const [n, setN] = useState(2);
  const [gridM, setGridM] = useState(makeGrid(2, 2));
  const [gridB, setGridB] = useState(makeGrid(2, 1));
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const labels = convention === 'nodal'
    ? { M: 'Y', mName: 'admitancias', in: 'I', inName: 'corrientes de nodo', out: 'V', outName: 'voltajes de nodo', unitIn: 'A', unitOut: 'V' }
    : { M: 'Z', mName: 'impedancias de malla', in: 'V', inName: 'voltajes de malla', out: 'I', outName: 'corrientes de malla', unitIn: 'V', unitOut: 'A' };

  const updateN = (v) => {
    setN(v);
    setGridM((g) => resizeGrid(g, v, v));
    setGridB((g) => resizeGrid(g, v, 1));
    setResult(null); setError('');
  };
  const cellM = (i, j, v) => setGridM((g) => { const ng = g.map((r) => r.slice()); ng[i][j] = v; return ng; });
  const cellB = (i, j, v) => setGridB((g) => { const ng = g.map((r) => r.slice()); ng[i][j] = v; return ng; });

  const solve = () => {
    setError('');
    try {
      const M = gridToComplex(gridM);
      const Bcol = gridToComplex(gridB);
      const detM = math.det(M);
      if (math.abs(detM) < 1e-9) {
        throw new Error(`La matriz ${labels.M} es singular (det ≈ 0): el sistema no tiene solución única.`);
      }
      const Minv = math.inv(M);
      const Xcol = math.multiply(Minv, Bcol);
      const x = Xcol.map((row) => row[0]);
      const check = math.multiply(M, Xcol).map((row) => row[0]);
      const bUsed = Bcol.map((row) => row[0]);
      setResult({ x, check, bUsed });
    } catch (e) {
      setResult(null);
      setError(e.message || 'No se pudo resolver el sistema.');
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Panel>
        <div className="qz-panel-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <Label>Convención</Label>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Btn active={convention === 'nodal'} accent={C.amber} onClick={() => setConvention('nodal')}>NODAL (Y·V = I)</Btn>
            <Btn active={convention === 'mallas'} accent={C.sky} onClick={() => setConvention('mallas')}>MALLAS (Z·I = V)</Btn>
          </div>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 14, flexWrap: 'wrap' }}>
          <SizeStepper label="Orden n" value={n} onChange={updateN} />
          <span style={{ fontFamily: MONO, fontSize: 11, color: C.muted }}>
            sistema {n}×{n}: {labels.M} · {labels.out} = {labels.in}
          </span>
        </div>

        <div className="qz-grid-2" style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
          <div>
            <Label>Matriz {labels.M} ({labels.mName}) — {n}×{n}</Label>
            <div style={{ overflowX: 'auto' }}>
              <MatrixGrid grid={gridM} onCell={cellM} color={C.amber} />
            </div>
          </div>
          <div>
            <Label>Vector {labels.in} ({labels.inName}) — {n}×1</Label>
            <div style={{ overflowX: 'auto' }}>
              <MatrixGrid grid={gridB} onCell={cellB} color={C.sky} />
            </div>
          </div>
        </div>

        <div style={{ marginTop: 14 }}>
          <Btn onClick={solve}>RESOLVER → {labels.out} = {labels.M}⁻¹{labels.in}</Btn>
        </div>
      </Panel>

      <Panel>
        <Label>Resultado: {labels.outName}</Label>
        {error ? (
          <ErrorBox message={error} />
        ) : result ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {result.x.map((val, i) => (
              <div key={i} style={{ background: C.bg, border: `1px solid ${C.borderLit}`, borderRadius: 4, padding: '10px 14px' }}>
                <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginBottom: 4 }}>{labels.out}{i + 1}</div>
                <Tex tex={withUnit(texComplex(val), labels.unitOut)} color={C.phosphor} size={18} />
                <div style={{ marginTop: 2 }}><Tex tex={withUnit(texPolar(val), labels.unitOut)} color={C.muted} size={12.5} /></div>
              </div>
            ))}
            <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, marginTop: 4, overflowX: 'auto', whiteSpace: 'nowrap' }}>
              verificación {labels.M}·{labels.out} = {result.check.map((c) => formatComplex(c)).join(', ')} {labels.unitIn}
              &nbsp;(debe coincidir con {labels.in} = {result.bUsed.map((c) => formatComplex(c)).join(', ')} {labels.unitIn})
            </div>
          </div>
        ) : (
          <div style={{ color: C.muted, fontFamily: MONO, fontSize: 13 }}>—</div>
        )}
      </Panel>
    </div>
  );
}

/* ============================== MATRIX MODULE: SELECTOR ============================== */
function MatrixModule() {
  const [matMode, setMatMode] = useState('ops'); // 'ops' | 'solve'
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        <Btn active={matMode === 'ops'} onClick={() => setMatMode('ops')}>OPERACIONES (A, B)</Btn>
        <Btn active={matMode === 'solve'} onClick={() => setMatMode('solve')}>RESOLVER SISTEMA Mx = B (NODAL / MALLAS)</Btn>
      </div>
      <div style={{ fontFamily: MONO, fontSize: 11, color: C.muted, lineHeight: 1.6 }}>
        las celdas aceptan expresiones: <span style={{ color: C.text }}>13-5j+10</span> · <span style={{ color: C.text }}>5∠30 + 2∠-45</span> · <span style={{ color: C.text }}>(3+4j)*2</span> · <span style={{ color: C.text }}>10∥(5+5j)</span>
      </div>
      {matMode === 'ops' ? <MatrixOpsModule /> : <SystemSolverModule />}
    </div>
  );
}

/* ============================== APP ROOT ============================== */
/* Botón de tema, compartido por ambas consolas. */
function ThemeToggle({ theme, onChange }) {
  const isDark = theme === 'dark';
  return (
    <button onClick={() => onChange(isDark ? 'light' : 'dark')}
      title={isDark ? 'Cambiar a modo día' : 'Cambiar a modo noche'}
      style={{ fontFamily: MONO, fontSize: 12, padding: '7px 12px', borderRadius: 4,
        border: `1px solid ${C.borderLit}`, background: 'transparent', color: C.text,
        cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 7, whiteSpace: 'nowrap' }}>
      <span style={{ fontSize: 13, color: C.phosphor }}>{isDark ? '☀' : '☾'}</span>
      {isDark ? 'MODO DÍA' : 'MODO NOCHE'}
    </button>
  );
}

function App() {
  const [mode, setMode] = useState('complex');
  const [theme, setTheme] = useState('dark');
  C = THEMES[theme];                       // se aplica antes de que rendericen los hijos
  useEffect(() => {
    document.documentElement.style.background = C.bg;
    document.body.style.background = C.bg;
  }, [theme]);
  return (
    <div className="qz-root" style={{ background: C.bg, minHeight: '100%', padding: 24, fontFamily: SANS, color: C.text }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        input::placeholder { color: ${C.muted}; }
        .katex { color: inherit; }

        /* ===================================================================
           Diseño responsivo: horizontal en escritorio (comportamiento original
           sin cambios), y apilado en formato VERTICAL en pantallas de celular.
           Todo lo de abajo solo se activa por debajo de 760px de ancho.
        =================================================================== */
        @media (max-width: 760px) {
          .qz-root { padding: 12px !important; }
          .qz-tag { font-size: 10px !important; }
          .qz-h1 { font-size: 21px !important; }

          /* Pestañas de módulo: de fila horizontal a columna vertical, botones a
             ancho completo — mucho más fácil de tocar con el dedo. */
          .qz-tabs { flex-direction: column; }
          .qz-tabs button {
            width: 100%;
            white-space: normal !important;
            text-align: center;
            font-size: 12.5px !important;
            padding: 12px 10px !important;
          }

          /* Cuadrículas de dos columnas (panel + diagrama de Argand, Matriz A/B, etc.)
             pasan de "1.3fr 1fr" / "1fr 1fr" a una sola columna apilada. */
          .qz-grid-2 { grid-template-columns: 1fr !important; }

          /* Menos relleno interno en cada panel para aprovechar el ancho angosto. */
          .qz-panel { padding: 12px !important; }

          /* Filas de ítems (impedancias, fasores, pares R/X) se envuelven en vez
             de desbordarse fuera de la pantalla. */
          .qz-item-row { flex-wrap: wrap; row-gap: 8px; }
          .qz-field-pair { flex-wrap: wrap; row-gap: 6px; }
          .qz-panel-header { flex-wrap: wrap; row-gap: 10px; }
        }
      `}</style>

      <div className="qz-head" style={{ marginBottom: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div>
          <div className="qz-tag" style={{ fontFamily: MONO, fontSize: 11, letterSpacing: '0.2em', color: C.phosphor, textTransform: 'uppercase' }}>
            ◈ instrumento de cálculo
          </div>
          <h1 className="qz-h1" style={{ fontFamily: SANS, fontWeight: 700, fontSize: 28, margin: '4px 0 2px' }}>Consola Z</h1>
        </div>
        <ThemeToggle theme={theme} onChange={setTheme} />
      </div>

      <div className="qz-tabs" style={{ display: 'flex', gap: 8, marginBottom: 20, borderBottom: `1px solid ${C.border}`, paddingBottom: 16, flexWrap: 'wrap' }}>
        <Btn active={mode === 'complex'} onClick={() => setMode('complex')}>NÚMEROS COMPLEJOS</Btn>
        <Btn active={mode === 'circuit'} onClick={() => setMode('circuit')}>IMPEDANCIAS SERIE/PARALELO</Btn>
        <Btn active={mode === 'components'} onClick={() => setMode('components')}>COMPONENTES (f, L, C → jX)</Btn>
        <Btn active={mode === 'phasor'} onClick={() => setMode('phasor')}>FASORES V / I</Btn>
        <Btn active={mode === 'regulation'} onClick={() => setMode('regulation')}>REGULACIÓN / MÁQUINA</Btn>
        <Btn active={mode === 'matrix'} onClick={() => setMode('matrix')}>MATRICES COMPLEJAS</Btn>
      </div>

      {mode === 'complex' ? <ComplexModule />
        : mode === 'circuit' ? <CircuitModule />
        : mode === 'components' ? <ComponentsModule />
        : mode === 'phasor' ? <PhasorModule />
        : mode === 'regulation' ? <RegulationModule />
        : <MatrixModule />}

      <div style={{ marginTop: 24, fontFamily: MONO, fontSize: 11, color: C.muted, borderTop: `1px solid ${C.border}`, paddingTop: 12, textAlign: 'center' }}>
        Hecho por Jesús Peña, UNEFA LARA. Instrumento hecho con apoyo de Anthropic.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
